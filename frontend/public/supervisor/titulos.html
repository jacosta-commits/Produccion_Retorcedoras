<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <base href="/retorcidos/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Supervisor | Títulos</title>
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/supervisor.css" />

</head>

<body data-theme="dark">

  <header class="sup-header">
    <div class="sup-header-left">
      <button id="menuBtn" type="button" class="hamburger" aria-controls="supMenu" aria-expanded="false"
        aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">Supervisor</div>
    </div>
    <a href="/supervisor/logout" class="btn sup-logout">Cerrar sesión</a>
  </header>

  <nav id="supMenu" class="drawer" aria-hidden="true">
    <a href="/supervisor">Resumen</a>
    <a href="/supervisor/programacion">Programación</a>
    <a href="/supervisor/titulos" aria-current="page">Títulos</a>
  </nav>

  <main class="page">
    <section class="card">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;">
        <div>
          <h2 style="font-size: 1.25rem; font-weight: 600; color: #fff; margin: 0;">Gestionar Títulos</h2>
          <p style="color: var(--muted); font-size: 0.9rem; margin-top: 4px;">Configura los tiempos y colores de cada
            título.</p>
        </div>
        <button class="btn" id="btnNuevoTitulo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nuevo Título
        </button>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr>
                <th>Título</th>
                <th>Min/descarga</th>
                <th style="width: 60px; text-align: center;">Color</th>
                <th style="width: 100px; text-align: center;">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbTitulos"></tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- Footer con nombre del supervisor -->
  <footer class="sup-footer">
    <span id="supName" class="sup-name"></span>
  </footer>

  <script type="module" src="/js/supervisor/nav.js"></script>
  <script type="module" src="/js/supervisor/titulos.js"></script>

  <script>
    (function () {
      const stored = sessionStorage.getItem('supNombre');
      const el = document.getElementById('supName');
      if (stored && el) {
        el.textContent = stored;
      }
    })();
  </script>

  <!-- Modal para Agregar/Editar Título -->
  <div id="modalTitulo" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Nuevo Título</h3>
      </div>
      <form id="frmTitulo" novalidate>
        <input type="hidden" id="titulo_id" value="" />

        <div class="field">
          <label for="nombre">Nombre del Título</label>
          <input id="nombre" placeholder="Ej. 108 NY" required />
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="min">Min / Descarga</label>
            <input id="min" type="number" min="1" step="1" placeholder="90" required />
          </div>
          <div class="field">
            <label for="color">Color</label>
            <input id="color" type="color" value="#ffffff" required style="height: 42px; padding: 4px;" />
          </div>
        </div>

        <div id="msg" class="muted" style="margin-top: 12px; font-size: 0.9rem;"></div>

        <div class="modal-footer">
          <button class="btn ghost" type="button" id="btnCancel">Cancelar</button>
          <button class="btn" type="submit" id="btnSubmit">
            <span id="btnSubmitText">Guardar</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</body>

</html>
