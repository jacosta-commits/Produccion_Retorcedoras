<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <base href="/retorcidos/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Supervisor | Resumen</title>

  <!-- Estilos (rutas relativas, válidas con IP pública en HTTP) -->
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/supervisor.css" />

  <!-- Flatpickr (Dark Theme) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

  <!-- Ajustes del header: nombre a la derecha + botón logout -->
  <style>
    .sup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.5rem 1rem;
    }

    .sup-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sup-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      opacity: 0.9;
      white-space: nowrap;
    }

    .sup-name {
      font-weight: 500;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sup-logout {
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      background-color: #2d8cff;
      color: #ffffff;
      border-radius: 4px;
      border: none;
      text-decoration: none;
      display: inline-block;
    }

    .sup-logout:hover {
      filter: brightness(1.1);
    }

    /* --- Responsive móvil / tablet --- */
    @media (max-width: 768px) {
      .sup-header {
        flex-direction: column;
        align-items: stretch;
      }

      .sup-header-left {
        width: 100%;
        justify-content: flex-start;
      }

      .sup-user {
        width: 100%;
        justify-content: space-between;
        margin-top: 0.25rem;
      }

      .sup-name {
        flex: 1;
        min-width: 0;
        max-width: 100%;
      }

      .sup-logout {
        padding: 0.3rem 0.75rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>

<body data-theme="dark">
  <!-- Header + Drawer -->
  <header class="sup-header">
    <div class="sup-header-left">
      <button id="menuBtn" type="button" class="hamburger" aria-controls="supMenu" aria-expanded="false"
        aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">Supervisor</div>
    </div>

    <!-- Nombre del supervisor + Cerrar sesión (lado derecho) -->
    <div class="sup-user">
      <span id="supName" class="sup-name"></span>
      <a href="/supervisor/logout" class="btn sup-logout">Cerrar sesión</a>
    </div>
  </header>

  <nav id="supMenu" class="drawer" aria-hidden="true">
    <a href="/supervisor" aria-current="page">Resumen</a>
    <a href="/supervisor/programacion">Programación</a>
    <a href="/supervisor/titulos">Títulos</a>
  </nav>

  <main class="page">
    <section class="card">
      <div class="form-row">
        <div class="field">
          <label>Máquina</label>
          <select id="selMaquina"></select>
        </div>
        <div class="field">
          <label>Lado</label>
          <select id="selLado"></select>
        </div>
        <div class="actions">
          <button class="btn" id="btnRefresh">Refrescar</button>
        </div>
      </div>

      <!-- Lista de Programaciones Activas -->
      <div id="secProgramaciones" class="mt2" style="display:none">
        <h3>Programaciones Activas</h3>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>OT</th>
                <th>Título</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbProgramaciones"></tbody>
          </table>
        </div>
      </div>

      <!-- Resumen compacto -->
      <div class="pills mt2" id="hdrRow">
        <span class="pill">Título: <strong id="hdrTitulo">—</strong></span>
        <span class="pill">Tiempo/descarga: <strong id="hdrTiempo">—</strong> min</span>
        <span class="pill">OT: <strong id="hdrOT">—</strong></span>
      </div>

      <div class="table-wrap mt2">
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr>
                <th>N</th>
                <th>F. H. INICIO</th>
                <th>F. H. FINAL</th>
              </tr>
            </thead>
            <tbody id="tbPlan"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- JS: menú hamburguesa + lógica de la página -->
  <script type="module" src="/js/supervisor/nav.js"></script>
  <script type="module" src="/js/supervisor/resumen.js"></script>

  <!-- Gestionar y mostrar el nombre del supervisor -->
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('nom');

      if (fromQuery) {
        sessionStorage.setItem('supNombre', fromQuery);
        const url = new URL(window.location.href);
        url.searchParams.delete('nom');
        window.history.replaceState({}, '', url.pathname + url.search);
      }

      const stored = sessionStorage.getItem('supNombre');
      const el = document.getElementById('supName');
      if (stored && el) {
        el.textContent = stored;
      }
    })();
  </script>
</body>

</html>
