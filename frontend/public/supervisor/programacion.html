<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <base href="/retorcidos/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Supervisor | Programación</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/css/common.css"/>
  <link rel="stylesheet" href="/css/supervisor.css"/>

  <!-- Ajustes del header: nombre a la derecha + botón logout -->
  <style>
    .sup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.5rem 1rem;
    }

    .sup-header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .sup-user {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
      opacity: 0.9;
      white-space: nowrap;
    }

    .sup-name {
      font-weight: 500;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sup-logout {
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      background-color: #2d8cff;
      color: #ffffff;
      border-radius: 4px;
      border: none;
      text-decoration: none;
      display: inline-block;
    }

    .sup-logout:hover {
      filter: brightness(1.1);
    }

    @media (max-width: 768px) {
      .sup-header {
        flex-direction: column;
        align-items: stretch;
      }

      .sup-header-left {
        width: 100%;
        justify-content: flex-start;
      }

      .sup-user {
        width: 100%;
        justify-content: space-between;
        margin-top: 0.25rem;
      }

      .sup-name {
        flex: 1;
        min-width: 0;
        max-width: 100%;
      }

      .sup-logout {
        padding: 0.3rem 0.75rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body data-theme="dark">

  <!-- Header + Drawer -->
  <header class="sup-header">
    <div class="sup-header-left">
      <button id="menuBtn" type="button" class="hamburger"
              aria-controls="supMenu" aria-expanded="false" aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">Supervisor</div>
    </div>

    <div class="sup-user">
      <span id="supName" class="sup-name"></span>
      <a href="/supervisor/logout" class="btn sup-logout">Cerrar sesión</a>
    </div>
  </header>

  <nav id="supMenu" class="drawer" aria-hidden="true">
    <a href="/supervisor">Resumen</a>
    <a href="/supervisor/programacion" aria-current="page">Programación</a>
    <a href="/supervisor/titulos">Títulos</a>
  </nav>

  <main class="page">
    <section class="card">
      <h3>Nueva Programación</h3>

      <form id="frmProg" class="form-row" novalidate>
        <div class="field">
          <label>Máquina</label>
          <select id="maquina_id" required></select>
        </div>

        <div class="field">
          <label>Lado</label>
          <select id="lado_id" required></select>
        </div>

        <div class="field">
          <label>OT (cod.)</label>
          <input id="otcod" type="text" placeholder="OT00001338" required>
        </div>

        <div class="field">
          <label>Título</label>
          <select id="titulo_id" required></select>
        </div>

        <div class="field">
          <label>Fecha Hora inicio</label>
          <input id="inicio" type="datetime-local" required>
        </div>

        <div class="field">
          <label># Descargas</label>
          <input id="desc" type="number" min="1" step="1" required>
        </div>

        <div class="actions" style="grid-column:1 / -1">
          <button class="btn primary" type="submit" id="btnCrear">Crear</button>
          <span id="msg" class="muted"></span>
          <span id="lblPlanVigente" class="muted"></span>
        </div>
      </form>
    </section>

    <section id="cardPlan" class="card mt2" hidden>
      <h3>Plan generado</h3>
      <div class="pills">
        <span class="pill">Fecha: <strong id="planFecha">—</strong></span>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr><th>N</th><th>F. H. INICIO</th><th>F. H. FINAL</th></tr>
            </thead>
            <tbody id="tbPlan"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="/js/supervisor/nav.js"></script>
  <script type="module" src="/js/supervisor/programacion.js"></script>

  <!-- Mostrar nombre del supervisor desde sessionStorage -->
  <script>
    (function () {
      const stored = sessionStorage.getItem('supNombre');
      const el = document.getElementById('supName');
      if (stored && el) {
        el.textContent = stored;
      }
    })();
  </script>
</body>
</html>
