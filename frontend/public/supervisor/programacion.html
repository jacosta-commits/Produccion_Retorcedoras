<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <base href="/retorcidos/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Supervisor | Programación</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/supervisor.css" />

  <!-- Flatpickr (Dark Theme) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

</head>

<body data-theme="dark">

  <!-- Header + Drawer -->
  <header class="sup-header">
    <div class="sup-header-left">
      <button id="menuBtn" type="button" class="hamburger" aria-controls="supMenu" aria-expanded="false"
        aria-label="Abrir menú">
        <span></span><span></span><span></span>
      </button>
      <div class="brand">Supervisor</div>
    </div>
    <a href="/supervisor/logout" class="btn sup-logout">Cerrar sesión</a>
  </header>

  <nav id="supMenu" class="drawer" aria-hidden="true">
    <a href="/supervisor">Resumen</a>
    <a href="/supervisor/programacion" aria-current="page">Programación</a>
    <a href="/supervisor/titulos">Títulos</a>
  </nav>

  <main class="page">
    <section class="card">
      <h3>Nueva Programación</h3>

      <form id="frmProg" class="form-row" novalidate>
        <div class="field">
          <label>Máquina</label>
          <select id="maquina_id" required></select>
        </div>

        <div class="field" style="display: none;">
          <label>Lado</label>
          <select id="lado_id" required></select>
        </div>

        <div class="field">
          <label>OT (cod.)</label>
          <input id="otcod" type="text" placeholder="OT00001338" required>
        </div>

        <div class="field">
          <label>Título</label>
          <select id="titulo_id" required></select>
        </div>

        <div class="field">
          <label>Fecha Hora inicio</label>
          <input id="inicio" type="text" class="flatpickr-input" required>
        </div>

        <div class="field">
          <label># Descargas</label>
          <input id="desc" type="number" min="1" step="1" required>
        </div>

        <div class="actions" style="grid-column:1 / -1">
          <button class="btn primary" type="submit" id="btnCrear">Crear</button>
          <span id="msg" class="muted"></span>
          <span id="lblPlanVigente" class="muted"></span>
        </div>
      </form>
    </section>

    <section id="cardPlan" class="card mt2" hidden>
      <h3>Plan generado</h3>
      <div class="pills">
        <span class="pill">Fecha: <strong id="planFecha">—</strong></span>
      </div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr>
                <th>N</th>
                <th>F. H. INICIO</th>
                <th>F. H. FINAL</th>
              </tr>
            </thead>
            <tbody id="tbPlan"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer con nombre del supervisor -->
  <footer class="sup-footer">
    <span id="supName" class="sup-name"></span>
  </footer>

  <script type="module" src="/js/supervisor/nav.js"></script>
  <script type="module" src="/js/supervisor/programacion.js"></script>

  <!-- Mostrar nombre del supervisor desde sessionStorage -->
  <script>
    (function () {
      const stored = sessionStorage.getItem('supNombre');
      const el = document.getElementById('supName');
      if (stored && el) {
        el.textContent = stored;
      }
    })();
  </script>
</body>

</html>
