<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Supervisor | Login</title>

  <!-- Estilos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/supervisor.css" />

  <style>
    /* Estilos específicos para el Login (centrado perfecto) */
    .login-body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* El fondo ya viene de common.css */
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      /* Glassmorphism heredado de .card en supervisor.css */
      padding: 40px 32px;
      text-align: center;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-title {
      margin: 0 0 8px 0;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle {
      margin: 0 0 32px 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .login-error {
      display: none;
      margin-bottom: 20px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      text-align: left;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-field {
      text-align: left;
    }

    .login-field label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Input más grande para login */
    .login-field input {
      width: 100%;
      height: 48px;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      text-align: center;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: #fff;
      transition: all 0.2s;
    }

    .login-field input:focus {
      outline: none;
      border-color: var(--accent-from);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .login-btn-full {
      width: 100%;
      height: 48px;
      font-size: 1rem;
      margin-top: 8px;
      /* Hereda estilos de .btn en supervisor.css */
    }

    .brand-logo {
      font-size: 3rem;
      margin-bottom: 16px;
      display: inline-block;
      filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
    }
  </style>
</head>

<body class="login-body">
  <main style="width: 100%; display: flex; justify-content: center;">
    <section class="card login-card">
      <div class="brand-logo">🛡️</div>
      <h1 class="login-title">Bienvenido</h1>
      <p class="login-subtitle">Ingresa tu código de supervisor</p>

      <div id="error" class="login-error"></div>

      <!-- Sin action: hace POST a /supervisor/login -->
      <form method="POST" class="login-form">
        <div class="login-field">
          <!-- <label for="codigo">Código</label> -->
          <input type="text" id="codigo" name="codigo" autocomplete="off" required placeholder="••••" autofocus />
        </div>

        <div class="login-field">
          <button type="submit" class="btn login-btn-full">
            Ingresar al Sistema
          </button>
        </div>
      </form>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const e = params.get('e');
      const logoutFlag = params.get('logout');
      const errorBox = document.getElementById('error');
      const form = document.querySelector('form');
      const input = document.getElementById('codigo');

      // 1. Manejo de Logout
      if (logoutFlag === '1') {
        sessionStorage.removeItem('supNombre');
        localStorage.removeItem('supCode'); // Borrar credencial guardada

        // Limpiar URL
        const url = new URL(window.location.href);
        url.searchParams.delete('logout');
        window.history.replaceState({}, '', url.pathname + url.search);
      }

      // 2. Manejo de Errores
      if (e === '1') {
        errorBox.textContent = 'Ingrese su código de supervisor.';
        errorBox.style.display = 'block';
      } else if (e === '2') {
        errorBox.textContent = 'Código inválido o no autorizado.';
        errorBox.style.display = 'block';
        localStorage.removeItem('supCode'); // Si falló, borrar lo guardado
      } else if (e === '3') {
        errorBox.textContent = 'Error interno. Intente nuevamente.';
        errorBox.style.display = 'block';
      }

      // 3. Auto-Login (Si no hubo error ni logout explícito)
      if (!e && !logoutFlag) {
        const savedCode = localStorage.getItem('supCode');
        if (savedCode) {
          input.value = savedCode;
          // Pequeño delay visual o directo
          form.submit();
        }
      }

      // 4. Guardar al enviar
      form.addEventListener('submit', () => {
        const val = input.value.trim();
        if (val) {
          localStorage.setItem('supCode', val);
        }
      });

    })();
  </script>
</body>

</html>
